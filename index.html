<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VortexDQ AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#111;color:#e0e0e0;height:100vh;display:flex;flex-direction:column}
header{padding:12px 20px;background:#1a1a1a;border-bottom:1px solid #333;display:flex;align-items:center;gap:12px}
header h1{font-size:16px;color:#00ff88}
#dot{width:10px;height:10px;border-radius:50%;background:#00ff88}
#chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:80%;padding:10px 14px;border-radius:12px;line-height:1.5;white-space:pre-wrap;font-size:14px}
.user{background:#0055aa;align-self:flex-end}
.bot{background:#2a2a2a;align-self:flex-start}
.bot.thinking{opacity:.5}
#bar{border-top:1px solid #333;padding:12px 20px;display:flex;gap:8px;background:#1a1a1a}
#input{flex:1;padding:10px 14px;border-radius:8px;border:1px solid #333;background:#222;color:#e0e0e0;font-size:14px;outline:0}
#input:focus{border-color:#0055aa}
#send{padding:10px 20px;border-radius:8px;border:0;background:#0055aa;color:#fff;font-size:14px;cursor:pointer}
#send:hover{background:#0066cc}
code{background:#333;padding:2px 6px;border-radius:4px;font-size:13px}
</style>
</head>
<body>
<header>
  <div id="dot"></div>
  <h1>VortexDQ AI</h1>
</header>
<div id="chat">
  <div class="msg bot">Ready. Ask anything.</div>
</div>
<div id="bar">
  <input id="input" placeholder="Message..." autofocus>
  <button id="send">Send</button>
</div>
<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const send = document.getElementById('send');
const dot = document.getElementById('dot');

async function ask() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  chat.innerHTML += `<div class="msg user">${escapeHtml(text)}</div>`;
  const botDiv = document.createElement('div');
  botDiv.className = 'msg bot thinking';
  botDiv.textContent = '...';
  chat.appendChild(botDiv);
  chat.scrollTop = chat.scrollHeight;
  dot.style.background = '#ffaa00';

  try {
    const res = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'qwen2.5-coder',
        messages: [{role: 'user', content: text}],
        stream: true
      })
    });

    if (!res.ok) throw new Error(res.statusText);
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    botDiv.className = 'msg bot';
    botDiv.textContent = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n').filter(l => l.startsWith('data: ') && l !== 'data: [DONE]');
      for (const line of lines) {
        try {
          const json = JSON.parse(line.slice(6));
          const content = json.choices?.[0]?.delta?.content || '';
          botDiv.textContent += content;
        } catch (_) {}
      }
      chat.scrollTop = chat.scrollHeight;
    }
  } catch (e) {
    botDiv.textContent = 'Error: ' + e.message;
  }
  dot.style.background = '#00ff88';
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

send.onclick = ask;
input.onkeydown = e => { if (e.key === 'Enter') ask(); };
</script>
</body>
</html>
